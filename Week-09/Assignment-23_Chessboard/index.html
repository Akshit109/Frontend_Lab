<!doctype html>

<body>
    <div id=b style='display:grid;grid-template-columns:repeat(8,50px)'></div>
    <script>
        for (let i = 0; i < 64; i++) { let d = document.createElement('div'); d.style.width = '50px'; d.style.height = '50px'; d.style.background = ((Math.floor(i / 8) + i) % 2) ? 'black' : 'white'; b.appendChild(d); }
    </script>
</body>
